services:

  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:17
    container_name: assets_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: AssetManagementDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2929
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AssetManagementDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ASP.NET Core API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assets_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=AssetManagementDB;Username=postgres;Password=2929
      Jwt__Key: ThisIsAVeryStrongSecretKeyForAssetsManagementAPI2026FromBuguard
      Jwt__Issuer: AssetsManagementAPI
      Jwt__Audience: AssetsManagementAPIUsers
      Jwt__ExpireMinutes: 60
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
